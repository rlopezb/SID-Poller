spring:
  application:
    name: Poller
  datasource:
    url: jdbc:postgresql://localhost:5432/sid
    username: sid
    password: ${SID_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      pool-name: SIDHikariPool
logging:
  level:
    es:
      vodafone:
        sid:
          poller: debug
    org:
      snmp4j: TRACE